<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

html,
body{

margin:0;
width:100%;
height:100%;
overflow:hidden;

}

a-scene{

position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;

}

#zoom-controls{

position:fixed;

bottom:25px;

left:50%;

transform:translateX(-50%);

display:flex;

gap:20px;

z-index:9999;

}

.zoom-btn{

width:60px;

height:60px;

border:none;

border-radius:50%;

font-size:24px;

font-weight:bold;

background:rgba(255,255,255,.85);

box-shadow:0 4px 8px rgba(0,0,0,.3);

}

</style>

</head>

<body>

<div id="zoom-controls">

<button id="btn-minus" class="zoom-btn">−</button>

<button id="btn-plus" class="zoom-btn">+</button>

</div>

<a-scene

mindar-image="
imageTargetSrc: targets.mind;
autoStart:true;
uiScanning:no;
uiLoading:no;
uiError:no;
"

color-space="sRGB"

renderer="colorManagement:true"

vr-mode-ui="enabled:false"

device-orientation-permission-ui="enabled:false">

<a-assets>

<img
id="sheet"
src="spritesheet.png">

</a-assets>

<a-camera

cursor="rayOrigin: mouse"

raycaster="objects:.clickable">

</a-camera>

<a-entity
mindar-image-target="targetIndex:0">

<a-plane

id="character"

class="clickable"

width="1"

height="1"

material="

src:#sheet;

transparent:true;

alphaTest:0.5;

side:double

"

scale="1.5 1.5 1.5">

</a-plane>

</a-entity>

</a-scene>

<script src="main.js"></script>

</body>

</html>
