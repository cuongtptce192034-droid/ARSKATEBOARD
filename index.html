<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1,
user-scalable=no">

<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

html,body{

margin:0;
padding:0;
overflow:hidden;
width:100%;
height:100%;

}

a-scene{

position:fixed !important;
top:0;
left:0;
width:100vw;
height:100vh;

}

#zoom{

position:fixed;

bottom:25px;

left:50%;

transform:translateX(-50%);

display:flex;

gap:20px;

z-index:9999;

}

.zoom{

width:60px;
height:60px;
border:none;
border-radius:50%;
font-size:28px;
background:white;

}

</style>

</head>

<body>

<div id="zoom">

<button id="minus" class="zoom">−</button>

<button id="plus" class="zoom">+</button>

</div>

<a-scene

mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;"

color-space="sRGB"

renderer="colorManagement:true"

vr-mode-ui="enabled:false"

device-orientation-permission-ui="enabled:false">

<a-assets timeout="10000">

<img
id="sheet"
src="./spritesheet.png">

</a-assets>

<a-camera
position="0 0 0"
look-controls="enabled:false">
</a-camera>

<a-entity
id="target"
mindar-image-target="targetIndex:0">

<a-plane

id="character"

width="1"

height="1"

material="

src:#sheet;

transparent:true;

alphaTest:0.01;

side:double

"

scale="1.5 1.5 1.5">

</a-plane>

</a-entity>

</a-scene>

<script src="main.js"></script>

</body>

</html>
