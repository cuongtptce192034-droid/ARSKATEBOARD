<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Skateboard</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      overflow: hidden;
      background: #000;
    }
    #arContainer {
      width: 100%;
      height: 100vh;
      position: relative;
    }
    #controlPanel {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      z-index: 100;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px 25px;
      border-radius: 50px;
      align-items: center;
      backdrop-filter: blur(10px);
    }
    .zoom-btn {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      font-weight: bold;
    }
    .zoom-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }
    .zoom-btn:active {
      transform: scale(0.95);
    }
    #zoomValue {
      color: white;
      font-weight: bold;
      min-width: 50px;
      text-align: center;
      font-size: 16px;
    }
    #status {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      color: #00ff00;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      z-index: 100;
      border: 2px solid #00ff00;
      min-width: 200px;
    }
  </style>
</head>
<body>
  <div id="arContainer">
    <!-- Scene AR với target.mind -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="spritesheet" src="spritesheet.png">
      </a-assets>

      <!-- Camera -->
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Entity gắn vào target -->
      <a-entity mindar-image-target="targetIndex: 0">
        <a-entity 
          id="my-character"
          geometry="primitive: plane; width: 1; height: 1"
          material="src: #spritesheet; transparent: true; side: double"
          position="0 0 0.1">
        </a-entity>
      </a-entity>
      
    </a-scene>
  </div>

  <!-- Control Panel -->
  <div id="controlPanel">
    <button id="zoomOut" class="zoom-btn">−</button>
    <div id="zoomValue">1.0x</div>
    <button id="zoomIn" class="zoom-btn">+</button>
  </div>

  <!-- Status Display -->
  <div id="status">
    <div>Status: <span id="statusText">Loading...</span></div>
    <div>Scale: <span id="scaleText">1.0</span></div>
    <div>Animation: <span id="animText">Waiting</span></div>
  </div>

  <!-- Script chính -->
  <script src="main.js"></script>
</body>
</html>
