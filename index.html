<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <!-- Bỏ gesture-detector gây lỗi, chỉ dùng MindAR thuần -->
  <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: #scanning-overlay" 
    renderer="colorManagement: true" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <img id="spritesheet" src="spritesheet.png">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Entity quan trọng: Thêm class 'clickable' để nhận zoom -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity 
        id="my-character"
        class="clickable"
        scale="2 2 2"
        geometry="primitive: plane; width: 1; height: 1"
        material="src: #spritesheet; transparent: true; side: double">
      </a-entity>
    </a-entity>
    
  </a-scene>

  <script src="main.js"></script>
  <!-- Script Zoom siêu nhẹ tích hợp trực tiếp, không gây đơ -->
  <script>
    let scale = 2;
    document.body.addEventListener('wheel', (e) => {
        scale += e.deltaY * -0.01;
        scale = Math.min(Math.max(scale, 0.5), 5);
        document.querySelector('#my-character').setAttribute('scale', `${scale} ${scale} ${scale}`);
    });
  </script>
</body>
</html>
