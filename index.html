<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        .zoom-ui {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            gap: 20px;
        }
        .btn {
            width: 50px;
            height: 50px;
            font-size: 30px;
            font-weight: bold;
            background-color: rgba(255, 255, 255, 0.8);
            border: 2px solid #000;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            line-height: 45px;
        }
    </style>
</head>
<body>
    <div class="zoom-ui">
        <div class="btn" id="btn-zoom-out">-</div>
        <div class="btn" id="btn-zoom-in">+</div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="idle_1" src="./default/Untitled_Artwork-1.png">
            <img id="idle_2" src="./default/Untitled_Artwork-2.png">
            <img id="idle_3" src="./default/Untitled_Artwork-3.png">
            <img id="idle_4" src="./default/Untitled_Artwork-4.png">
            <img id="idle_5" src="./default/Untitled_Artwork-5.png">
            <img id="idle_6" src="./default/Untitled_Artwork-6.png">
            <img id="idle_7" src="./default/Untitled_Artwork-7.png">
            <img id="idle_8" src="./default/Untitled_Artwork-8.png">
            <img id="idle_9" src="./default/Untitled_Artwork-9.png">
            <img id="idle_10" src="./default/Untitled_Artwork-10.png">
            
            <img id="jump_1" src="./jump/Untitled_Artwork-1.png">
            <img id="jump_2" src="./jump/Untitled_Artwork-2.png">
            <img id="jump_3" src="./jump/Untitled_Artwork-3.png">
            <img id="jump_4" src="./jump/Untitled_Artwork-4.png">
            <img id="jump_5" src="./jump/Untitled_Artwork-5.png">
            <img id="jump_6" src="./jump/Untitled_Artwork-6.png">
            <img id="jump_7" src="./jump/Untitled_Artwork-7.png">
            <img id="jump_8" src="./jump/Untitled_Artwork-8.png">
            <img id="jump_9" src="./jump/Untitled_Artwork-9.png">
            <img id="jump_10" src="./jump/Untitled_Artwork-10.png">
            <img id="jump_11" src="./jump/Untitled_Artwork-11.png">
            <img id="jump_12" src="./jump/Untitled_Artwork-12.png">
            <img id="jump_13" src="./jump/Untitled_Artwork-13.png">
            <img id="jump_14" src="./jump/Untitled_Artwork-14.png">
            <img id="jump_15" src="./jump/Untitled_Artwork-15.png">
            <img id="jump_16" src="./jump/Untitled_Artwork-16.png">
            <img id="jump_17" src="./jump/Untitled_Artwork-17.png">
            <img id="jump_18" src="./jump/Untitled_Artwork-18.png">
            <img id="jump_19" src="./jump/Untitled_Artwork-19.png">
            <img id="jump_20" src="./jump/Untitled_Artwork-20.png">
            <img id="jump_21" src="./jump/Untitled_Artwork-21.png">
            <img id="jump_22" src="./jump/Untitled_Artwork-22.png">
            <img id="jump_23" src="./jump/Untitled_Artwork-23.png">
            <img id="jump_24" src="./jump/Untitled_Artwork-24.png">
            <img id="jump_25" src="./jump/Untitled_Artwork-25.png">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0">
            <!-- VÙNG CHỨA 35 ẢNH (Code sẽ tự động đẩy ảnh vào đây) -->
            <a-entity id="char-container" scale="1 1 1"></a-entity>

            <!-- KHUNG CHẠM (HITBOX) VÔ HÌNH ĐỂ NHẬN TƯƠNG TÁC -->
            <a-plane id="hitbox" class="clickable" position="0 0 0" width="2" height="2" material="opacity: 0.01; transparent: true"></a-plane>
        </a-entity>
    </a-scene>
    
    <script src="./main.js"></script>
</body>
</html>
