<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
<script>
  var vConsole = new VConsole();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>AR Skateboard</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #zoom {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      z-index: 9999;
      pointer-events: auto;
    }

    .zoom-btn {
      width: 60px;
      height: 60px;
      border: 2px solid rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      font-size: 32px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .zoom-btn:active {
      background: rgba(0, 0, 0, 0.8);
      transform: scale(0.95);
    }

    .zoom-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Anti-spam text */
    #spam-warning {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 100, 100, 0.8);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 12px;
      display: none;
      z-index: 9998;
      pointer-events: none;
    }

    /* Status indicator */
    #status {
      position: fixed;
      top: 15px;
      right: 15px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: red;
      z-index: 9998;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
    }

    #status.tracking {
      background: lime;
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
    }

    /* Debug Panel */
    #debug-panel {
      position: fixed;
      top: 50px;
      left: 10px;
      color: #00ff00;
      font-size: 11px;
      background: rgba(0, 0, 0, 0.85);
      padding: 12px;
      border-radius: 6px;
      z-index: 9000;
      border: 1px solid rgba(0, 255, 0, 0.3);
      font-family: 'Courier New', monospace;
      line-height: 1.6;
      max-width: 200px;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
    }

    #debug-panel div {
      margin: 4px 0;
    }

    #debug-status {
      color: #ffff00;
      font-weight: bold;
    }

    #debug-marker {
      color: #00ffff;
    }

    #debug-scale {
      color: #ff00ff;
    }
  </style>
</head>

<body>
  <!-- Status indicator -->
  <div id="status"></div>

  <!-- Anti-spam warning -->
  <div id="spam-warning">Wait... Jumping is in progress!</div>

  <!-- Debug Panel -->
  <div id="debug-panel">
    <div id="debug-status">Status: Loading...</div>
    <div id="debug-marker">Marker: SEARCHING...</div>
    <div id="debug-scale">Scale: 1.5x</div>
  </div>

  <!-- Zoom Controls -->
  <div id="zoom">
    <button id="minus" class="zoom-btn" title="Zoom Out">−</button>
    <button id="plus" class="zoom-btn" title="Zoom In">+</button>
  </div>

  <!-- AR Scene -->
  <a-scene
    embedded
    mindar-image="imageTargetSrc: targets.mind; autoStart: true; maxTrackingDistance: 2"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets timeout="10000">
      <!-- Spritesheet with proper CORS handling -->
      <img id="sheet" src="spritesheet.png" crossorigin="anonymous" loading="lazy">
    </a-assets>

    <!-- Camera with locked rotation -->
    <a-camera 
      position="0 0 0" 
      rotation="0 0 0"
      look-controls="enabled: false"
      wasd-controls="enabled: false">
    </a-camera>

    <!-- Marker and Character -->
    <a-entity id="marker" mindar-image-target="targetIndex: 0">
      <a-entity
        id="character"
        geometry="primitive: plane; width: 1; height: 1; segmentsWidth: 1; segmentsHeight: 1"
        material="src: #sheet; transparent: true; side: double; alphaTest: 0.5; flatShading: false"
        scale="1.5 1.5 1.5"
        rotation="0 0 0"
        position="0 0 0">
      </a-entity>
    </a-entity>
  </a-scene>

  <script src="main.js"></script>
</body>
</html>
