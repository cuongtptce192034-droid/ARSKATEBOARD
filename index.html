<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <script>
    // Zoom bằng pinch (2 ngón tay) - Code nhẹ, không gây đơ
    AFRAME.registerComponent('pinch-zoom', {
      init: function() {
        this.initialScale = this.el.object3D.scale.clone();
        this.el.sceneEl.addEventListener('pinch', (e) => {
          let newScale = this.el.object3D.scale.x * e.detail.scaleChange;
          newScale = Math.min(Math.max(newScale, 0.5), 5); // Giới hạn từ 0.5x đến 5x
          this.el.object3D.scale.set(newScale, newScale, newScale);
        });
      }
    });
  </script>
</head>
<body>
  <!-- Tối ưu rendering để không đơ -->
  <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: #scanning-overlay" 
    gesture-detector 
    renderer="antialias: false; colorManagement: true; sortObjects: true;"
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <img id="spritesheet" src="spritesheet.png">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <!-- scale="2 2 2" là nhân vật to gấp đôi mặc định, pinch-zoom để zoom -->
      <a-entity 
        id="my-character"
        class="clickable"
        pinch-zoom
        scale="2 2 2"
        geometry="primitive: plane; width: 1; height: 1"
        material="src: #spritesheet; transparent: true; side: double">
      </a-entity>
    </a-entity>
    
  </a-scene>

  <script src="main.js"></script>
</body>
</html>
