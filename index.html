<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        .zoom-ui { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; gap: 20px; }
        .btn { width: 50px; height: 50px; font-size: 30px; font-weight: bold; background-color: rgba(255, 255, 255, 0.8); border: 2px solid #000; border-radius: 10px; cursor: pointer; text-align: center; line-height: 45px; }
    </style>
</head>
<body>
    <div class="zoom-ui">
        <div class="btn" id="btn-zoom-out">-</div>
        <div class="btn" id="btn-zoom-in">+</div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0">
            <!-- CHỈ DÙNG 1 IMAGE ĐỂ TIẾT KIỆM RAM -->
            <a-image id="char" class="clickable" src="./default/Untitled_Artwork-1.png" position="0 0 0" height="2" width="2" material="transparent: true; alphaTest: 0.5"></a-image>
        </a-entity>
    </a-scene>
    <script src="./main.js"></script>
</body>
</html>
