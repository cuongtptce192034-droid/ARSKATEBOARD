<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        /* Style cho 2 nút Zoom */
        #zoom-controls {
            position: fixed; bottom: 30px; right: 20px; z-index: 10;
            display: flex; flex-direction: column; gap: 10px;
        }
        .zoom-btn {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            background: rgba(255, 255, 255, 0.7); font-size: 24px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="scanning-overlay"></div>
    
    <!-- Giao diện nút bấm -->
    <div id="zoom-controls">
        <button id="btn-plus" class="zoom-btn">+</button>
        <button id="btn-minus" class="zoom-btn">-</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: #scanning-overlay" 
        renderer="colorManagement: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="spritesheet-img" src="spritesheet.png">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity 
                id="my-character"
                scale="1.5 1.5 1.5"
                geometry="primitive: plane; width: 1; height: 1.2"
                material="src: #spritesheet-img; transparent: true; side: double">
            </a-entity>
        </a-entity>
    </a-scene>

    <script src="main.js"></script>
</body>
</html>
