<a-scene>
  <a-assets>
    <!-- Khai báo file đúng tên spritesheet.png ở đây -->
    <img id="spritesheet" src="spritesheet.png">
  </a-assets>

  <!-- Vật thể nhân vật -->
  <a-entity 
    id="my-character"
    geometry="primitive: plane; width: 1; height: 1"
    material="src: #spritesheet; transparent: true; side: double">
  </a-entity>
</a-scene>

<script src="main.js"></script>
