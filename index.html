<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
        /* Nút Zoom ở giữa màn hình phía dưới */
        #zoom {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 20px; z-index: 9999;
        }
        .zoom {
            width: 65px; height: 65px; border: none; border-radius: 50%;
            font-size: 28px; background: rgba(255, 255, 255, 0.8); cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="zoom">
        <button id="minus" class="zoom">−</button>
        <button id="plus" class="zoom">+</button>
    </div>

    <a-scene 
        embedded 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" 
        renderer="colorManagement: true, physicallyCorrectLights: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="sheet" src="spritesheet.png">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false">
            <!-- QUAN TRỌNG: Cursor để nhận diện click. Raycaster lọc các vật thể clickable [1] -->
            <a-cursor fuse="false" raycaster="objects: .clickable"></a-cursor>
        </a-camera>

        <a-entity id="marker" mindar-image-target="targetIndex: 0">
            <a-entity 
                id="character"
                class="clickable"
                geometry="primitive: plane; width: 1; height: 1.2"
                /* alphaTest: 0.5 giúp khử viền đen/lỗi trong suốt trên mobile [3] */
                material="src: #sheet; transparent: true; side: double; alphaTest: 0.5"
                scale="1.5 1.5 1.5">
            </a-entity>
        </a-entity>
    </a-scene>
    <script src="main.js"></script>
</body>
</html>
