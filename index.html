<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Nạp thư viện A-Frame và MindAR -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <!-- Nạp thư viện xử lý cử chỉ (Zoom/Rotate) -->
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  <script>
    // Logic đơn giản để Zoom
    AFRAME.registerComponent('gesture-handler', {
      schema: { enabled: { default: true } },
      init: function () {
        this.el.sceneEl.addEventListener('pinch', (event) => {
          const scale = this.el.object3D.scale.x * event.detail.scaleChange;
          this.el.object3D.scale.set(scale, scale, scale);
        });
      }
    });
  </script>
</head>
<body>
  <!-- Thêm gesture-detector vào scene -->
  <a-scene mindar-image="imageTargetSrc: ./targets.mind;" gesture-detector renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <img id="spritesheet" src="spritesheet.png">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <!-- Thêm class clickable và gesture-handler để Zoom được -->
      <a-entity 
        id="my-character"
        class="clickable"
        gesture-handler
        geometry="primitive: plane; width: 1; height: 1"
        material="src: #spritesheet; transparent: true; side: double">
      </a-entity>
    </a-entity>
    
  </a-scene>

  <script src="main.js"></script>
</body>
</html>
