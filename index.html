<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    /* Đảm bảo khung quét hiển thị rõ */
    .mindar-ui-scanning { display: block !important; }
  </style>
</head>
<body>
  <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: true;" 
    renderer="colorManagement: true" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <img id="spritesheet" src="spritesheet.png">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity 
        id="my-character"
        class="clickable"
        scale="2 2 2"
        geometry="primitive: plane; width: 1; height: 1"
        material="src: #spritesheet; transparent: true; side: double">
      </a-entity>
    </a-entity>
  </a-scene>

  <script src="main.js"></script>
</body>
</html>
