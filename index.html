<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    /* Giúp UI quét nổi lên */
    #scanning-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; align-items: center; justify-content: center; }
    #scanning-overlay.hidden { display: none; }
    /* Nút zoom ổn định ở góc phải */
    #zoom-controls { position: fixed; bottom: 20px; right: 20px; z-index: 20; display: flex; flex-direction: column; gap: 10px; }
    .zoom-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: white; font-size: 24px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
  </style>
</head>
<body>
  <div id="scanning-overlay">Quét ảnh mục tiêu...</div>
  
  <div id="zoom-controls">
    <button id="btn-plus" class="zoom-btn">+</button>
    <button id="btn-minus" class="zoom-btn">-</button>
  </div>

  <!-- Thêm 'embedded' và tối ưu renderer -->
  <a-scene embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true" 
           mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiScanning: #scanning-overlay" 
           vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <img id="spritesheet" src="spritesheet.png">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity 
        id="my-character"
        scale="1.5 1.5 1.5"
        geometry="primitive: plane; width: 1; height: 1"
        material="src: #spritesheet; transparent: true; side: double">
      </a-entity>
    </a-entity>
  </a-scene>

  <script src="main.js"></script>
</body>
</html>
